          headers:
            X-RateLimit-Limit:
              description: Maximum number of allowed requests per minute.
              schema:
                type: integer
                format: int32
                minimum: 1
                maximum: 4096
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponseV1'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      summary: Update Team
      description: |
        Update a team by its ID.\
        \
        **Required permissions:** _teams.edit_
      operationId: updateTeamByIdV1
      tags:
        - Teams
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequestV1'
      responses:
        '200':
          description: Team updated.
          headers:
            X-RateLimit-Limit:
              description: Maximum number of allowed requests per minute.
              schema:
                type: integer
                format: int32
                minimum: 1
                maximum: 4096
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponseV1'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete Team
      description: |
        Delete a team by its ID.\
        \
        **Required permissions:** _teams.edit_
      operationId: deleteTeamByIdV1
      tags:
        - Teams
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
      responses:
        '204':
          description: Team deleted.
          headers:
            X-RateLimit-Limit:
              description: Maximum number of allowed requests per minute.
              schema:
                type: integer
                format: int32
                minimum: 1
                maximum: 4096
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
