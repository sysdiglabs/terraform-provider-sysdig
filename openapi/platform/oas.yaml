components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Offset:
      name: offset
      in: query
      description: The offset number of items to start with
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
        maximum: 2147483647
        default: 0
        example: 30
    Limit:
      name: limit
      in: query
      description: The number of items to return
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
        default: 25
        example: 25
    OrderBy:
      name: orderby
      in: query
      description: The order by field separated by a colon for the direction
      required: false
      schema:
        type: string
        maxLength: 256
        default: ''
        example: name:asc
    Filter:
      name: filter
      in: query
      description: The filter by field separated by a colon for the filter value
      required: false
      schema:
        type: string
        maxLength: 8192
        default: ''
        example: name:filter
    TeamIdPath:
      name: teamId
      in: path
      description: The team ID.
      required: true
      schema:
        $ref: '#/components/schemas/UnlimitedLong'
    UserIdPath:
      name: userId
      in: path
      description: The user ID.
      required: true
      schema:
        $ref: '#/components/schemas/UnlimitedLong'
    MultiFilter:
      name: filter
      in: query
      description: |
        Filters to apply in the form of `key:value`.\
        Multiple filters can be applied by repeating the `filter` parameter:\
        `&filter=key1:value1&filter=key2:value2`
      required: false
      style: form
      schema:
        type: array
        maxItems: 4
        default: []
        items:
          type: string
          maxLength: 512
          default: ''
          example: first_name:john
    AccessKeyIdPath:
      name: accessKeyId
      in: path
      description: The access key id.
      required: true
      schema:
        $ref: '#/components/schemas/UnlimitedLong'
    GroupMappingIdPath:
      name: groupMappingId
      in: path
      description: The group mapping ID.
      required: true
      schema:
        $ref: '#/components/schemas/UnlimitedLong'
    SsoSettingsIdPath:
      name: ssoSettingsId
      in: path
      description: SSO settings ID.
      required: true
      schema:
        $ref: '#/components/schemas/UnlimitedLong'
    IpFilterIdPath:
      name: ipFilterId
      in: path
      description: IP Filter ID.
      required: true
      schema:
        $ref: '#/components/schemas/UnlimitedLong'
    PermissionsFilter:
      name: filter
      description: |
        Filter by products when getting permissions for custom roles.\
        Avaliable products are: SDS, SDC.\
        You can specify a single product or a list of products separated by commas.\
        Product names are case-sensitive.\
        If not specified, all permissions are returned.
      in: query
      required: false
      schema:
        type: string
        maxLength: 8192
        default: ''
        example: products:SDS
    RoleIdPath:
      name: roleId
      in: path
      description: The role id.
      required: true
      schema:
        $ref: '#/components/schemas/UnlimitedLong'
  schemas:
    OffsetPaginatedResponse:
      type: object
      title: Offset Paginated Response
      properties:
        page:
          description: Page information.
          type: object
          properties:
            previous:
              type: string
              maxLength: 8192
              nullable: true
              example: '10'
            next:
              type: string
              maxLength: 8192
              nullable: true
              example: '30'
            total:
              type: integer
              format: int64
              minimum: 0
              example: 1
        data:
          description: Paginated data.
          type: array
          maxItems: 200
          items: {}
    UnlimitedLong:
      description: ' '
      type: integer
      format: int64
      minimum: 0
      example: 1
    TeamRoleV1:
      title: Team Role
      description: The standard team role provided by Sysdig.
      type: string
      example: ROLE_TEAM_READ
      enum:
        - ROLE_TEAM_NONE
        - ROLE_TEAM_READ
        - ROLE_TEAM_SERVICE_MANAGER
        - ROLE_TEAM_STANDARD
        - ROLE_TEAM_EDIT
        - ROLE_TEAM_MANAGER
    Product:
      title: Sysdig Product
      description: The Sysdig product
      type: string
      example: secure
      enum:
        - monitor
        - secure
    EntryPointModuleV1:
      title: Entry Point Module
      type: string
      description: The Module is the area in Sysdig Monitor.
      example: Alerts
      enum:
        - Alerts
        - Dashboards
        - Events
        - Explore
        - Overview
        - Settings
        - DashboardTemplates
    EntryPointV1:
      title: Entry Point
      type: object
      description: |
        The page you see after logging into Sysdig UI. It is defined by a Module and a Selection.
        **The Entry Point is not supported in Sysdig Secure.**
      properties:
        module:
          $ref: '#/components/schemas/EntryPointModuleV1'
        selection:
          type: string
          description: |
            The selection is the specific page within the Module, usually defined by the resource ID.
            It is supported only supported by **Dashboards** and **DashboardTemplates** Modules.
          example: '2231245'
          maxLength: 128
          nullable: true
    UiSettingsV1:
      title: UiSettings
      type: object
      description: UI related settings.
      properties:
        entryPoint:
          $ref: '#/components/schemas/EntryPointV1'
        theme:
          type: string
          description: The color assigned to the team.
          example: '#112233'
          maxLength: 7
    ScopeTypeV1:
      title: Scope Type
      type: string
      example: PROMETHEUS_REMOTE_WRITE
      enum:
        - AGENT
        - AWS_CLOUD_WATCH
        - HOST_CONTAINER
        - IBM_PLATFORM_METRICS
        - PROMETHEUS_REMOTE_WRITE
    ScopeV1:
      title: Scope
      type: object
      required:
        - type
        - expression
      properties:
        type:
          $ref: '#/components/schemas/ScopeTypeV1'
        expression:
          type: string
          maxLength: 65356
          example: kubernetes.cluster.name in ("test-env")
    AdditionalTeamPermissionsV1:
      title: Additional Team Permissions
      type: object
      description: Additional permissions available to the users of the team.
      properties:
        hasSysdigCaptures:
          description: Enable the Sysdig captures feature for this team.
          type: boolean
          default: false
          example: false
        hasInfrastructureEvents:
          type: boolean
          default: false
          example: false
        hasAwsData:
          type: boolean
          default: false
          example: false
        hasRapidResponse:
          type: boolean
          default: false
          example: false
        hasAgentCli:
          type: boolean
          default: false
          example: false
        hasBeaconMetrics:
          type: boolean
          default: false
          example: false
    TeamResponseV1:
      type: object
      title: Team Response V1
      properties:
        id:
          $ref: '#/components/schemas/UnlimitedLong'
        name:
          description: The name of the team. It must be unique.
          type: string
          example: Scanning operations
          maxLength: 256
        description:
          description: A description of the team explaining what is it used for.
          type: string
          maxLength: 2048
          example: This team has access to scanning results
          nullable: true
        isImmutableTeam:
          description: Specifies if the team is immutable. This is true if the team was created by the system with full access. It cannot be modified.
          type: boolean
          example: false
        isDefaultTeam:
          description: Specifies if the team is the default team. The default team is used to automatically assign new users to a team.
          type: boolean
          example: false
        standardTeamRole:
          allOf:
            - $ref: '#/components/schemas/TeamRoleV1'
          description: |
            The standard team role assigned by default to users added to this team. Mutually exclusive with 'customTeamRoleId'.
          nullable: true
        customTeamRoleId:
          allOf:
            - $ref: '#/components/schemas/UnlimitedLong'
          description: |
            The custom team role assigned by default to users added to this team. Mutually exclusive with 'standardTeamRoleId'.
          nullable: true
        product:
          allOf:
            - $ref: '#/components/schemas/Product'
          description: The product to which the team is assigned to.
        uiSettings:
          $ref: '#/components/schemas/UiSettingsV1'
        isAllZones:
          description: |
            'True' if the users belonging to this team have access to all zones. Mutually exclusive with 'zoneIds'.
          type: boolean
          example: false
        zoneIds:
          description: |
            The list of zones that users assigned to this team will have access to. Mutually exclusive with 'allZones'.
          type: array
          items:
            $ref: '#/components/schemas/UnlimitedLong'
          maxItems: 8192
        scopes:
          description: The scopes available to the users of this team.
          type: array
          items:
            $ref: '#/components/schemas/ScopeV1'
          maxItems: 512
        additionalTeamPermissions:
          $ref: '#/components/schemas/AdditionalTeamPermissionsV1'
        dateCreated:
          description: The date (in ISO 8601 format) when this team was created.
          type: string
          format: date-time
          example: '2017-07-21T17:32:28Z'
          maxLength: 64
        lastUpdated:
          description: The date (in ISO 8601 format) when this team was last updated.
          type: string
