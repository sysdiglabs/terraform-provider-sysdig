        isDestinationVerificationEnabled:
          type: boolean
          description: Flag that indicates if the destination verification is enabled.
          example: true
        isEncryptionSupportEnabled:
          type: boolean
          description: Flag that indicates if the encryption support is enabled.
          example: true
    SamlResponseV1:
      type: object
      title: SAML Settings Response V1
      allOf:
        - $ref: '#/components/schemas/SsoSettingsResponseBaseV1'
        - $ref: '#/components/schemas/SamlBaseV1'
    OpenIdMetadataV1:
      type: object
      title: The metadata of the OpenID Connect provider
      properties:
        issuer:
          type: string
          description: The base issuer URL of the OpenID Connect provider.
          example: https://accounts.example.com
          maxLength: 2048
        authorizationEndpoint:
          type: string
          description: The authorization endpoint of the OpenID Connect provider.
          example: https://accounts.example.com/oauth2/authorize
          maxLength: 2048
        tokenEndpoint:
          type: string
          description: The token endpoint of the OpenID Connect provider.
          example: https://accounts.example.com/oauth2/token
          maxLength: 2048
        jwksUri:
          type: string
          description: The JSON Web Key Set URI of the OpenID Connect provider.
          example: https://accounts.example.com/oauth2/jwks
          maxLength: 2048
        endSessionEndpoint:
          type: string
          description: Single sign-out endpoint of the OpenID Connect provider.
          example: https://accounts.example.com/oauth2/logout
          maxLength: 2048
        tokenAuthMethod:
          type: string
          enum:
            - CLIENT_SECRET_BASIC
            - CLIENT_SECRET_POST
          description: The token authentication method of the OpenID Connect provider.
          example: CLIENT_SECRET_BASIC
      required:
        - issuerBaseUrl
        - authorizationEndpoint
        - tokenEndpoint
        - jsonWebKeySetEndpoint
        - tokenAuthMethod
    OpenIdBaseV1:
      type: object
      title: OpenID Settings Base Schema
      properties:
        issuerUrl:
          type: string
          description: The issuer URL of the OpenID Connect provider.
          example: https://accounts.example.com
          maxLength: 2048
        clientId:
          type: string
          description: The client ID of the OpenID Connect provider.
          example: client-id
          maxLength: 2048
        isMetadataDiscoveryEnabled:
          type: boolean
          description: Flag to indicate if the metadata discovery is enabled.
          example: true
        metadata:
          allOf:
            - $ref: '#/components/schemas/OpenIdMetadataV1'
          description: The metadata of the OpenID Connect provider.
        groupAttributeName:
          type: string
          description: The group attribute name of the OpenID Connect provider.
          example: groups
          maxLength: 64
        isAdditionalScopesCheckEnabled:
          type: boolean
          description: Flag to indicate if the additional scopes verification on login.
          example: true
        additionalScopes:
          type: array
          description: List of additional scopes to be verified on login.
          items:
            type: string
            description: The scope to be verified on login.
            maxLength: 64
            example: scope 1
          example:
            - scope 1
            - scope 2
          maxItems: 64
    OpenIdConfigResponseV1:
      type: object
      title: OpenID Connect SSO Settings Response V1
      allOf:
        - $ref: '#/components/schemas/SsoSettingsResponseBaseV1'
        - $ref: '#/components/schemas/OpenIdBaseV1'
    SsoTypeV1:
      title: SSO Type
      description: Supported SSO types
      type: string
      example: SAML
      enum:
        - SAML
        - OPENID
    SsoSettingsResponseV1:
      type: object
      title: SSO Settings Write Response V1
      allOf:
        - $ref: '#/components/schemas/SsoSettingsBaseSchemaV1'
        - type: object
          properties:
            id:
              $ref: '#/components/schemas/UnlimitedLong'
            config:
              $ref: '#/components/schemas/SsoSettingsResponseBaseV1'
            dateCreated:
              description: The date (in ISO 8601 format) when this SSO config was created.
              type: string
              format: date-time
              example: '2017-07-21T17:32:28Z'
              maxLength: 64
            lastUpdated:
              description: The date (in ISO 8601 format) when this SSO config was last updated.
              type: string
              format: date-time
              example: '2017-07-21T17:32:28Z'
              maxLength: 64
            version:
              $ref: '#/components/schemas/UnlimitedLong'
    AllSsoSettingsResponseV1:
      title: Get All SSO Settings Response V1
      type: object
      properties:
        data:
          description: The list of SSO settings.
          type: array
          items:
            $ref: '#/components/schemas/SsoSettingsResponseV1'
          maxItems: 250
    SsoSettingsCreateRequestBaseV1:
      title: SSO Settings Create Request Base V1
      type: object
      description: Create Request SSO Settings Base Schema
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/SsoTypeV1'
      discriminator:
        propertyName: type
        mapping:
          SAML: '#/components/schemas/SamlCreateRequestV1'
          OPENID: '#/components/schemas/OpenIdCreateRequestV1'
    SamlCreateRequestV1:
      type: object
      title: SAML Settings Create Request V1
      allOf:
        - $ref: '#/components/schemas/SsoSettingsCreateRequestBaseV1'
        - $ref: '#/components/schemas/SamlBaseV1'
      required:
        - emailParameter
    OpenIdRequestBaseV1:
      type: object
      title: OpenID Settings Base Write Request V1
      allOf:
        - $ref: '#/components/schemas/OpenIdBaseV1'
        - type: object
          properties:
            clientSecret:
              type: string
              description: The client secret of the OpenID Connect provider.
              example: client-secret
              maxLength: 2048
    OpenIdCreateRequestV1:
      type: object
      title: OpenID Connect SSO Settings Create Request V1
      allOf:
        - $ref: '#/components/schemas/SsoSettingsCreateRequestBaseV1'
        - $ref: '#/components/schemas/OpenIdRequestBaseV1'
      required:
        - issuerUrl
        - clientId
        - clientSecret
    CreateSsoSettingsRequestV1:
      type: object
      title: Create SSO settings Request V1
      allOf:
        - $ref: '#/components/schemas/SsoSettingsBaseSchemaV1'
        - type: object
          properties:
            config:
              $ref: '#/components/schemas/SsoSettingsCreateRequestBaseV1'
      required:
        - product
        - config
    SsoSettingsUpdateRequestBaseV1:
      title: SSO Settings Update Request Base V1
      type: object
      description: Update Request SSO Settings Base Schema
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/SsoTypeV1'
      discriminator:
        propertyName: type
        mapping:
          SAML: '#/components/schemas/SamlUpdateRequestV1'
          OPENID: '#/components/schemas/OpenIdUpdateRequestV1'
    SamlUpdateRequestV1:
      type: object
      title: SAML Settings Update Request V1
      allOf:
        - $ref: '#/components/schemas/SsoSettingsUpdateRequestBaseV1'
        - $ref: '#/components/schemas/SamlBaseV1'
      required:
        - emailParameter
        - isSignatureValidationEnabled
        - isSignedAssertionEnabled
        - isDestinationVerificationEnabled
        - isEncryptionSupportEnabled
    OpenIdUpdateRequestV1:
      type: object
      title: OpenID Connect SSO Settings Update Request V1
      allOf:
        - $ref: '#/components/schemas/SsoSettingsUpdateRequestBaseV1'
        - $ref: '#/components/schemas/OpenIdRequestBaseV1'
      required:
        - issuerUrl
        - clientId
        - clientSecret
        - isAdditionalScopesCheckEnabled
        - isMetadataDiscoveryEnabled
    UpdateSsoSettingsRequestV1:
      type: object
      title: Update SSO settings Request V1
      allOf:
        - $ref: '#/components/schemas/SsoSettingsBaseSchemaV1'
        - type: object
          properties:
            version:
              $ref: '#/components/schemas/UnlimitedLong'
            config:
              $ref: '#/components/schemas/SsoSettingsUpdateRequestBaseV1'
      required:
        - version
        - product
        - config
        - isActive
        - createUserOnLogin
        - isPasswordLoginEnabled
        - isSingleLogoutEnabled
        - isGroupMappingEnabled
    ServiceAccountsNotificationSettinsBase:
      type: object
      description: The base schema for the service accounts notification settings.
      properties:
        isEnabled:
          description: Whether the notification settings are enabled or not.
          type: boolean
          example: true
        notificationChannelIds:
          description: |
            The list of notification channel IDs to which the notifications are to be sent.\
            \
            Supported types are **EMAIL** and **SLACK**.
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/UnlimitedLong'
          maxItems: 10
        daysBeforeExpiry:
          description: The number of days before the expiry of the service account when the notifications are to be sent.
          type: array
          minimum: 1
          maximum: 60
          maxItems: 5
          default:
            - 30
            - 7
            - 1
          items:
            type: integer
            format: int32
            minimum: 1
            maximum: 60
            example: 3
    ServiceAccountsNotificationSettingsResponseV1:
      type: object
      title: Service Accounts Notification Settings Response V1
      allOf:
        - $ref: '#/components/schemas/ServiceAccountsNotificationSettinsBase'
    UpdateServiceAccountsNotificationSettingsRequestV1:
      type: object
      title: Update Service Accounts Notification Settings Request V1
      required:
        - isEnabled
        - notificationChannelIds
        - daysBeforeExpiry
      allOf:
        - $ref: '#/components/schemas/ServiceAccountsNotificationSettinsBase'
    CreateServiceAccountsNotificationSettingsRequestV1:
      type: object
      title: Create Service Accounts Notification Settings Request V1
      required:
        - isEnabled
        - notificationChannelIds
      allOf:
        - $ref: '#/components/schemas/ServiceAccountsNotificationSettinsBase'
    IpFilterResponseV1:
      type: object
      title: IP Filter Response V1
      properties:
        id:
          $ref: '#/components/schemas/UnlimitedLong'
        ipRange:
          type: string
          description: IP range in CIDR notation
          maxLength: 43
          example: 192.168.0.0/24
        note:
          type: string
          maxLength: 128
          example: London Office
          nullable: true
        isEnabled:
          type: boolean
          example: true
        isAllowed:
          description: Whether the IP range is allowed or not.
          type: boolean
          example: true
        lastUpdated:
          description: The date when IP filter was last updated.
          type: string
          format: date-time
          example: '2017-07-21T17:32:28Z'
          maxLength: 64
    IpFiltersPaginatedResponseV1:
      title: Get Paginated IP Filters Response V1
      allOf:
        - $ref: '#/components/schemas/OffsetPaginatedResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/IpFilterResponseV1'
              maxItems: 200
    CreateIpFilterV1:
      type: object
      title: Create IP Filter Request V1
      description: Request to create IP filter.
      required:
        - ipRange
        - isEnabled
      properties:
        ipRange:
          description: IP range in CIDR notation
          type: string
          maxLength: 43
          example: 192.168.0.0/24
        note:
          type: string
          maxLength: 128
          example: London Office
        isEnabled:
          type: boolean
          example: true
    UpdateIpFilterV1:
      type: object
      title: Update IP Filter Request V1
      description: Request to update IP filter.
      required:
        - ipRange
        - isEnabled
        - note
      properties:
        ipRange:
          description: IP range in CIDR notation
          type: string
          maxLength: 43
          example: 192.168.0.0/24
        note:
          type: string
          maxLength: 128
          example: London Office
        isEnabled:
          type: boolean
          example: true
    IpFiltersSettingsV1:
      type: object
      title: Ip Filters Settings V1
      description: |
        Used to configure IP filters settings.
      properties:
        isFilteringEnabled:
          type: boolean
          description: Specifies if IP filtering is enabled.
          example: false
    PermissionV1:
      type: object
      description: Permission to perform an action on the Sysdig platform.
      properties:
        id:
          description: |
            Permission Authority.
          type: string
          example: cspm-results.read
          maxLength: 256
        description:
          description: |
            Permission description.
          type: string
          example: Access CSPM results
          maxLength: 512
        products:
          description: |
            Specifies the Sysdig product the permission applies to (Secure = SDS; Monitor = SDC).
          type: array
          uniqueItems: true
          items:
            type: string
            description: |
              Sysdig Monitor Product - SDC\
              Sysdig Secure Product - SDS
            example: SDS
            maxLength: 3
          maxItems: 2
        dependencies:
          description: |
            List of permissions that this permission depends on.
          type: array
          uniqueItems: true
          items:
            type: string
            maxLength: 256
            example: cspm-results.read
          maxItems: 100
    GetPermissionsResponseV1:
      title: Permissions Response V1
      description: Permissions response
      type: object
      properties:
        permissions:
          type: array
          uniqueItems: true
          description: |
            Set of permissions
          items:
            $ref: '#/components/schemas/PermissionV1'
          maxItems: 1000
        total:
          description: Total number of permissions
          type: integer
          format: int32
          minimum: 0
          maximum: 2147483647
          example: 135
    RoleResponseV1:
      title: Create Role Response
      description: Create role response
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UnlimitedLong'
        description:
          description: Describes the role
          type: string
          maxLength: 255
          example: Enables access to Dashboards section
        monitorPermissions:
          description: |
            Set of Monitor permissions assigned to the role. 
            Check GET /platform/v1/permissions to obtain the list of available values.
          type: array
          uniqueItems: true
          items:
            type: string
            maxLength: 255
            example: alerts.read
          maxItems: 100
        securePermissions:
          description: |
            Set of Secure permissions assigned to the role. 
            Check GET /platform/v1/permissions to obtain the list of available values.
          type: array
          uniqueItems: true
          items:
            type: string
            maxLength: 255
            example: scanning.read
          maxItems: 100
        name:
          description: The display name of the role
          type: string
          maxLength: 255
          example: Dashboard Viewer
    GetRolesPaginatedResponseV1:
      title: Get Paginated Roles Response V1
      allOf:
        - $ref: '#/components/schemas/OffsetPaginatedResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/RoleResponseV1'
              maxItems: 200
    RoleRequestV1:
      title: Role Request
      description: Create or update role request
      type: object
      required:
        - name
      properties:
        description:
          description: Describes the role
          type: string
          maxLength: 255
          example: Enables access to Dashboards section
        monitorPermissions:
          description: |
            Set of Monitor permissions assigned to the role. 
            Check GET /platform/v1/permissions to obtain the list of available values.
          type: array
          uniqueItems: true
          items:
            type: string
            maxLength: 255
            example: alerts.read
          maxItems: 100
        securePermissions:
          description: |
            Set of Secure permissions assigned to the role. 
            Check GET /platform/v1/permissions to obtain the list of available values.
          type: array
          uniqueItems: true
          items:
            type: string
            maxLength: 255
            example: scanning.read
          maxItems: 100
        name:
          description: The display name of the role
          type: string
          maxLength: 255
          example: Dashboard Viewer
  responses:
    BadRequest:
      description: Operation failed due to invalid payload.
      headers:
        X-RateLimit-Limit:
          description: Maximum number of allowed requests per minute.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 4096
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: bad_request
            message: Bad request
            details: []
    Unauthorized:
      description: Access denied.
      headers:
        X-RateLimit-Limit:
          description: Maximum number of allowed requests per minute.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 4096
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: unauthorized
            message: Unauthorized
            details: []
    TooManyRequests:
      description: Too many requests.
      headers:
        Retry-After:
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 14400
          description: Retry after X seconds.
          required: false
        X-RateLimit-Limit:
          description: Maximum number of allowed requests per minute.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 4096
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: too_many_requests
            message: Too many requests
            details: []
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: internal_server_error
            message: Internal server error
            details: []
    Conflict:
      description: Conflict.
      headers:
        X-RateLimit-Limit:
          description: Maximum number of allowed requests per minute.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 4096
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: conflict
            message: Conflict
            details: []
    UnsupportedMediaType:
      description: Server cannot accept content of type specified in Content-Type header.
      headers:
        X-RateLimit-Limit:
          description: Maximum number of allowed requests per minute.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 4096
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: unsupported_media_type
            message: Unsupported media type
            details: []
    UnprocessableEntity:
      description: Server was unable to process the request.
      headers:
        X-RateLimit-Limit:
          description: Maximum number of allowed requests per minute.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 4096
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: unprocessable_content
            message: Unprocessable content
            details: []
    NotFound:
      description: Not found.
      headers:
        X-RateLimit-Limit:
          description: Maximum number of allowed requests per minute.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 4096
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: resource_not_found
            message: Resource not found
            details: []
    Forbidden:
      description: Not enough privileges to complete the action.
      headers:
        X-RateLimit-Limit:
          description: Maximum number of allowed requests per minute.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 4096
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: forbidden
            message: Forbidden
            details: []
